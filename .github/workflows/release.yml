name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.0.0). Don't include the 'v' prefix, it will be added automatically."
        required: true

permissions:
  contents: write

jobs:
  release:
    if: github.actor == 'ljellevo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          files: |
            ghostab
            install.sh
